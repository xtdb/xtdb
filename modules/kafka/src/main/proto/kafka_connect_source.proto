edition = "2023";

package xtdb.kafka.connectsrc.proto;

import "google/protobuf/any.proto";

option java_multiple_files = true;

message KafkaConnectSourceConfig {
    string remote = 1;
    string topic = 2;

    // Flat KC-style config: key.converter / transforms etc.
    map<string, string> connect_config = 3;

    google.protobuf.Any indexer = 4;
}

message KafkaConnectSourceToken {
    int64 offset = 1;
}

message DocsIndexerConfig {
    // $schema.$table, or bare $table for the default schema
    string table = 1;
}
