edition = "2023";

package xtdb.kafka.proto;

option java_multiple_files = true;

message KafkaLogConfig {
    string log_cluster_alias = 1;
    string topic = 2;
    int32 epoch = 3;
    string replica_cluster_alias = 4;
    string replica_topic = 5;
    reserved 6; // was group_id, now on the cluster
}